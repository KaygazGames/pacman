<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry Dash Clone</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const player = {
    x:100,
    y:canvas.height-150,
    w:40,
    h:40,
    velY:0,
    grounded:false
};

const gravity = 0.8;
const jumpPower = -14;

let obstacles = [];
let score = 0;
let gameOver = false;

function spawnObstacle(){
    obstacles.push({
        x:canvas.width,
        y:canvas.height-100,
        w:40,
        h:40
    });
}

setInterval(spawnObstacle,1500);

function reset(){
    obstacles=[];
    score=0;
    gameOver=false;
    player.y=canvas.height-150;
    player.velY=0;
}

function update(){

    if(gameOver) return;

    player.velY += gravity;
    player.y += player.velY;

    let ground = canvas.height-100;

    if(player.y + player.h >= ground){
        player.y = ground-player.h;
        player.velY = 0;
        player.grounded = true;
    }else{
        player.grounded = false;
    }

    obstacles.forEach(o=>{
        o.x -= 6;

        if(
            player.x < o.x+o.w &&
            player.x+player.w > o.x &&
            player.y < o.y+o.h &&
            player.y+player.h > o.y
        ){
            gameOver = true;
        }
    });

    obstacles = obstacles.filter(o=>o.x+o.w>0);

    score++;
}

function draw(){

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff88";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="#444";
    ctx.fillRect(0,canvas.height-100,canvas.width,100);

    ctx.fillStyle="#ff4444";
    obstacles.forEach(o=>{
        ctx.beginPath();
        ctx.moveTo(o.x,o.y+o.h);
        ctx.lineTo(o.x+o.w/2,o.y);
        ctx.lineTo(o.x+o.w,o.y+o.h);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("Score: "+Math.floor(score/10),20,50);

    if(gameOver){
        ctx.font="60px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-180,canvas.height/2);
        ctx.font="30px Arial";
        ctx.fillText("Press SPACE",canvas.width/2-90,canvas.height/2+50);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        if(gameOver){
            reset();
            return;
        }

        if(player.grounded){
            player.velY = jumpPower;
        }
    }
});

document.addEventListener("touchstart",()=>{

    if(player.grounded && !gameOver){
        player.velY = jumpPower;
    }
});

loop();
</script>

</body>
</html>
